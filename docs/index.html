<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inverted Parabola Explorer</title>
<style>
  :root {
    --bg: #ffffff;
    --panel: #f5f4f8;
    --ink: #1f1a2e;
    --muted: #6b6674;
    --primary: #2e1f47;
    --secondary: #e8a33d;
    --grid: #d8d5e0;
    --axis: #9b96a8;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #16121f;
      --panel: #221c33;
      --ink: #f0edf5;
      --muted: #a49dae;
      --primary: #c9b6ef;
      --secondary: #f0b95a;
      --grid: #362d4a;
      --axis: #5c5468;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 2rem 1.25rem 3rem;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  h1 { font-size: 1.6rem; margin-bottom: 0.25rem; }
  p.lede { color: var(--muted); margin-top: 0; max-width: 68ch; line-height: 1.5; }
  .controls {
    display: flex;
    align-items: center;
    gap: 1rem;
    background: var(--panel);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    margin: 1.5rem 0;
    flex-wrap: wrap;
  }
  .controls label { font-weight: 600; white-space: nowrap; }
  .controls input[type=range] {
    flex: 1;
    min-width: 200px;
    accent-color: var(--secondary);
  }
  .r-value {
    font-variant-numeric: tabular-nums;
    font-weight: 700;
    color: var(--secondary);
    min-width: 3.5ch;
  }
  .plots {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.25rem;
  }
  @media (max-width: 720px) {
    .plots { grid-template-columns: 1fr; }
  }
  .card {
    background: var(--panel);
    border-radius: 12px;
    padding: 1rem 1.1rem 1.25rem;
  }
  .card h2 { font-size: 1.05rem; margin: 0 0 0.15rem; }
  .card .formula {
    font-family: "Courier New", monospace;
    color: var(--muted);
    font-size: 0.92rem;
    margin: 0 0 0.6rem;
  }
  svg { width: 100%; height: auto; display: block; }
  .curve { fill: none; stroke: var(--primary); stroke-width: 2.5; }
  .gridline { stroke: var(--grid); stroke-width: 1; }
  .axis { stroke: var(--axis); stroke-width: 1.3; }
  .marker { fill: var(--secondary); }
  .marker-line { stroke: var(--secondary); stroke-width: 1; stroke-dasharray: 4 3; }
  .axis-label { fill: var(--muted); font-size: 11px; font-family: inherit; }
  .stats {
    margin-top: 0.7rem;
    font-size: 0.88rem;
    color: var(--muted);
    line-height: 1.6;
  }
  .stats b { color: var(--ink); }
  footer {
    margin-top: 2rem;
    color: var(--muted);
    font-size: 0.85rem;
  }
  footer a { color: var(--secondary); }
</style>
</head>
<body>
<div class="wrap">
  <h1>Inverted Parabola Explorer</h1>
  <p class="lede">
    Two related helper functions from <code>src/utils.py</code> in the
    aesthetic-memory-model project. Drag the slider to see how <b>r</b>
    reshapes each curve.
  </p>

  <div class="controls">
    <label for="r-slider">r</label>
    <input type="range" id="r-slider" min="0.5" max="10" step="0.1" value="4">
    <span class="r-value" id="r-value">4.0</span>
  </div>

  <div class="plots">
    <div class="card">
      <h2>Symmetric</h2>
      <p class="formula">f(x, r) = 1 &minus; (x/r)&sup2;</p>
      <svg id="plot-symmetric" viewBox="0 0 500 380" preserveAspectRatio="xMidYMid meet"></svg>
      <div class="stats" id="stats-symmetric"></div>
    </div>
    <div class="card">
      <h2>Left-anchored</h2>
      <p class="formula">f(x, r) = 1 &minus; (2x/r &minus; 1)&sup2;</p>
      <svg id="plot-left" viewBox="0 0 500 380" preserveAspectRatio="xMidYMid meet"></svg>
      <div class="stats" id="stats-left"></div>
    </div>
  </div>

  <footer>
    Part of the <a href="https://github.com/mark-orr/aesthetic-memory-model" target="_blank" rel="noopener">aesthetic-memory-model</a> project.
  </footer>
</div>

<script>
(function () {
  "use strict";

  const W = 500, H = 380;
  const PAD = { left: 44, right: 16, top: 16, bottom: 34 };

  function symmetric(x, r) { return 1 - (x / r) ** 2; }
  function leftAnchored(x, r) { return 1 - (2 * x / r - 1) ** 2; }

  function sample(fn, r, xMin, xMax, n) {
    const pts = [];
    for (let i = 0; i <= n; i++) {
      const x = xMin + (xMax - xMin) * (i / n);
      pts.push([x, fn(x, r)]);
    }
    return pts;
  }

  function niceBounds(pts) {
    let yMin = Infinity, yMax = -Infinity;
    for (const [, y] of pts) {
      if (y < yMin) yMin = y;
      if (y > yMax) yMax = y;
    }
    yMax = Math.max(yMax, 1.2);
    const pad = (yMax - yMin) * 0.1 || 0.5;
    return [yMin - pad, yMax + pad];
  }

  function scaleX(x, xMin, xMax) {
    return PAD.left + (x - xMin) / (xMax - xMin) * (W - PAD.left - PAD.right);
  }
  function scaleY(y, yMin, yMax) {
    return H - PAD.bottom - (y - yMin) / (yMax - yMin) * (H - PAD.top - PAD.bottom);
  }

  function svgEl(tag, attrs) {
    const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
    for (const k in attrs) el.setAttribute(k, attrs[k]);
    return el;
  }

  function render(svgId, fn, r, xMin, xMax, markers) {
    const svg = document.getElementById(svgId);
    svg.innerHTML = "";
    svg.setAttribute("viewBox", `0 0 ${W} ${H}`);

    const pts = sample(fn, r, xMin, xMax, 200);
    const [yMin, yMax] = niceBounds(pts);

    // gridlines (y=0 and x=0 handled by axis; add a few light gridlines)
    const xTicks = 5, yTicks = 5;
    for (let i = 0; i <= xTicks; i++) {
      const x = xMin + (xMax - xMin) * (i / xTicks);
      const sx = scaleX(x, xMin, xMax);
      svg.appendChild(svgEl("line", {
        x1: sx, y1: PAD.top, x2: sx, y2: H - PAD.bottom, class: "gridline"
      }));
      svg.appendChild(svgEl("text", {
        x: sx, y: H - PAD.bottom + 16, class: "axis-label", "text-anchor": "middle"
      })).textContent = x.toFixed(1);
    }
    for (let i = 0; i <= yTicks; i++) {
      const y = yMin + (yMax - yMin) * (i / yTicks);
      const sy = scaleY(y, yMin, yMax);
      svg.appendChild(svgEl("line", {
        x1: PAD.left, y1: sy, x2: W - PAD.right, y2: sy, class: "gridline"
      }));
      svg.appendChild(svgEl("text", {
        x: PAD.left - 8, y: sy + 4, class: "axis-label", "text-anchor": "end"
      })).textContent = y.toFixed(1);
    }

    // axes (x=0 and y=0 if within range)
    if (yMin <= 0 && yMax >= 0) {
      const sy0 = scaleY(0, yMin, yMax);
      svg.appendChild(svgEl("line", { x1: PAD.left, y1: sy0, x2: W - PAD.right, y2: sy0, class: "axis" }));
    }
    if (xMin <= 0 && xMax >= 0) {
      const sx0 = scaleX(0, xMin, xMax);
      svg.appendChild(svgEl("line", { x1: sx0, y1: PAD.top, x2: sx0, y2: H - PAD.bottom, class: "axis" }));
    }

    // curve
    const d = pts.map(([x, y], i) => {
      const sx = scaleX(x, xMin, xMax), sy = scaleY(Math.max(yMin, Math.min(yMax, y)), yMin, yMax);
      return `${i === 0 ? "M" : "L"}${sx.toFixed(2)},${sy.toFixed(2)}`;
    }).join(" ");
    svg.appendChild(svgEl("path", { d, class: "curve" }));

    // markers (roots / vertex)
    for (const m of markers) {
      if (m.x < xMin || m.x > xMax) continue;
      const sx = scaleX(m.x, xMin, xMax);
      const sy = scaleY(Math.max(yMin, Math.min(yMax, m.y)), yMin, yMax);
      svg.appendChild(svgEl("line", { x1: sx, y1: PAD.top, x2: sx, y2: H - PAD.bottom, class: "marker-line" }));
      svg.appendChild(svgEl("circle", { cx: sx, cy: sy, r: 4.5, class: "marker" }));
    }
  }

  function update() {
    const r = parseFloat(document.getElementById("r-slider").value);
    document.getElementById("r-value").textContent = r.toFixed(1);

    // Symmetric: roots at -r, +r; vertex (0, 1)
    render("plot-symmetric", symmetric, r, -1.5 * r, 1.5 * r, [
      { x: -r, y: 0 }, { x: r, y: 0 }, { x: 0, y: 1 }
    ]);
    document.getElementById("stats-symmetric").innerHTML =
      `roots: <b>x = &minus;${r.toFixed(2)}, x = ${r.toFixed(2)}</b><br>` +
      `vertex: <b>(0, 1)</b>`;

    // Left-anchored: roots at 0, r; vertex (r/2, 1)
    render("plot-left", leftAnchored, r, -0.3 * r, 1.3 * r, [
      { x: 0, y: 0 }, { x: r, y: 0 }, { x: r / 2, y: 1 }
    ]);
    document.getElementById("stats-left").innerHTML =
      `roots: <b>x = 0, x = ${r.toFixed(2)}</b><br>` +
      `vertex: <b>(${(r / 2).toFixed(2)}, 1)</b>`;
  }

  document.getElementById("r-slider").addEventListener("input", update);
  update();
})();
</script>
</body>
</html>
